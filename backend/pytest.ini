[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async test support
asyncio_mode = auto

# Coverage configuration
addopts =
    --cov=app
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-report=lcov:coverage.lcov
    --cov-fail-under=60
    -v
    --tb=short

[coverage:run]
source = app
omit =
    app/db/migrations/*
    app/db/seed.py
    app/__init__.py
    app/main.py
    */alembic/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    @(abc\.)?abstractmethod
    pass
