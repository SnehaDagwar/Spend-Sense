[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is intentionally omitted here.
# alembic/env.py reads DATABASE_URL from the environment / .env file
# via app.core.config.settings so there is no hardcoded connection string
# in version control.  Set DATABASE_URL in your shell or .env before
# running alembic commands locally.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
